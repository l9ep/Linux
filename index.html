<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunix | Instant Script Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono&display=swap');
        body { background: #050505; color: #00ff41; font-family: 'Space Mono', monospace; }
        .hacker-card { background: #0a0a0a; border: 1px solid #1a1a1a; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .glow:focus { border-color: #00ff41; box-shadow: 0 0 10px #00ff4133; outline: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div id="main-ui" class="w-full max-w-2xl">
        <header class="mb-8 mt-4">
            <h1 class="text-4xl font-black text-white italic">LUNIX<span class="text-green-500">.io</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">No-Login Anonymous Script Hosting</p>
        </header>

        <div class="hacker-card p-6 rounded-xl mb-6">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-bold text-gray-400 uppercase">Input Terminal</span>
                <select id="obf-level" class="bg-black border border-gray-800 text-[10px] text-green-500 p-1 rounded">
                    <option value="light">Light Obf</option>
                    <option value="max">Max VM</option>
                </select>
            </div>
            
            <textarea id="script-input" class="w-full h-64 bg-black border border-gray-800 p-4 rounded-lg text-sm text-green-400 glow" placeholder="-- Paste your script here..."></textarea>
            
            <button id="gen-btn" onclick="uploadScript()" class="w-full mt-4 bg-green-600 text-black font-bold py-4 rounded-lg hover:bg-green-400 transition-transform active:scale-95">
                GENERATE DELTA LINK
            </button>
        </div>

        <div id="result-area" class="hidden hacker-card p-6 rounded-xl border-green-500/40">
            <span class="text-[10px] font-bold text-green-500 uppercase">Copy to Delta Executor:</span>
            <div class="mt-2 bg-black p-4 border border-green-900 rounded select-all">
                <code id="loadstring-out" class="text-xs text-white break-all"></code>
            </div>
            <button onclick="copyLink()" class="w-full mt-3 py-2 text-xs bg-gray-900 border border-gray-700 rounded">Copy to Clipboard</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- PASTE YOUR FIREBASE CONFIG HERE ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:6789"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. Check if we are viewing a RAW script for Delta
        const urlParams = new URLSearchParams(window.location.search);
        const rawId = urlParams.get('raw');

        if (rawId) {
            document.body.innerHTML = "<pre>-- Loading from Lunix Cloud...</pre>";
            const docRef = doc(db, "scripts", rawId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                // Wipes everything and shows ONLY the code so Delta can read it
                document.body.innerHTML = docSnap.data().content;
                document.body.style.backgroundColor = "white";
                document.body.style.color = "black";
                document.body.style.padding = "0";
            } else {
                document.body.innerText = "-- Error: 404 (Script Not Found)";
            }
        }

        // 2. Upload Function
        window.uploadScript = async () => {
            const input = document.getElementById('script-input').value;
            if(!input) return alert("System: Input Empty");

            const btn = document.getElementById('gen-btn');
            btn.innerText = "UPLOADING TO CLOUD...";

            // Simple Obfuscator (Bytecode injection)
            const protectedCode = `loadstring("${input.split('').map(c => `\\${c.charCodeAt(0)}`).join('')}")()`;
            
            // Random 6-character ID
            const id = Math.random().toString(36).substring(2, 8);

            try {
                await setDoc(doc(db, "scripts", id), {
                    content: protectedCode,
                    created: Date.now()
                });

                const rawLink = `${window.location.origin}${window.location.pathname}?raw=${id}`;
                document.getElementById('loadstring-out').innerText = `loadstring(game:HttpGet("${rawLink}"))()`;
                document.getElementById('result-area').classList.remove('hidden');
                btn.innerText = "GENERATE DELTA LINK";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } catch (e) {
                console.error(e);
                alert("Error! Did you set your Firebase Config?");
                btn.innerText = "GENERATE DELTA LINK";
            }
        };

        window.copyLink = () => {
            const text = document.getElementById('loadstring-out').innerText;
            navigator.clipboard.writeText(text);
            alert("COPIED");
        };
    </script>
</body>
  </html>
